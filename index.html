<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoundBloom Auth + Tracks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🎧 SoundBloom</h1>

  <div id="user-info"></div>

  <div id="auth-forms">
    <div id="login-form" class="active">
      <form id="form-login">
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
      </form>
      <p>Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
    </div>

    <div id="signup-form">
      <form id="form-signup">
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <input type="text" name="full_name" placeholder="Full Name" required />
        <button type="submit">Sign Up</button>
      </form>
      <p>Already have an account? <a href="#" id="show-login">Sign In</a></p>
    </div>
  </div>

  <button id="logout-btn" style="display:none;">Log Out</button>

  <form id="upload-form" style="display:none;">
    <input name="title" placeholder="Track Title" required />
    <input name="artist" placeholder="Artist" required />
    <input name="url" placeholder="MP3 URL" required />
    <input name="cover" placeholder="Cover Image URL" />
    <button type="submit">Add Track</button>
  </form>

  <div id="track-list">Loading...</div>

  <script type="module" src="js/script.js"></script>
</body>
</html>
